<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pinpoint</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <!-- Floating nav bar -->
    <nav class="nav-bar">
      <div class="nav-left">
        <span class="logo">📍 Pinpoint</span>
        <select id="graph-list-select" class="nav-select" aria-label="Select graph"></select>
        <select id="graph-list-filter" class="nav-select nav-select-sm" aria-label="Filter graph list">
          <option value="all">All</option>
          <option value="bookmarked">Bookmarked</option>
          <option value="recent">Recent</option>
        </select>
        <button id="create-graph" class="nav-btn" type="button">+ New</button>
        <input id="graph-name-input" class="nav-input" type="text" placeholder="Graph name" />
        <button id="bookmark-graph" class="nav-btn" type="button">☆</button>
      </div>
      <div class="nav-right">
        <select id="provider-select" class="nav-select">
          <option value="ollama-network">Ollama (Network)</option>
          <option value="ollama">Ollama (CLI)</option>
          <option value="copilot-cli">GitHub Copilot CLI</option>
        </select>
        <select id="model-select" class="nav-select">
          <option value="">Loading...</option>
        </select>
        <span class="nav-sep"></span>
        <input id="graph-search-input" class="nav-input nav-search" type="text" placeholder="Search nodes…" />
        <button id="graph-search-next" class="nav-btn" type="button">Next</button>
        <span id="graph-search-status" class="nav-hint"></span>
        <span class="nav-sep"></span>
        <div class="zoom-controls">
          <button id="zoom-out" class="nav-btn" type="button">−</button>
          <span id="zoom-label" class="nav-hint">100%</span>
          <button id="zoom-reset" class="nav-btn" type="button">Reset</button>
          <button id="zoom-in" class="nav-btn" type="button">+</button>
        </div>
        <button id="undo-graph" class="nav-btn" type="button" disabled>Undo</button>
        <button id="redo-graph" class="nav-btn" type="button" disabled>Redo</button>
        <button id="export-graph" class="nav-btn" type="button">Export</button>
        <button id="import-graph" class="nav-btn" type="button">Import</button>
        <button id="refresh-graph" class="nav-btn" type="button">↻</button>
        <button id="config-gear" class="nav-btn" type="button" aria-label="Toggle config drawer">⚙</button>
      </div>
    </nav>

    <!-- Slide-out config drawer -->
    <aside id="config-drawer" class="config-drawer" aria-label="Brainstorm configuration">
      <div class="drawer-head">
        <h2>Brainstorm Actions</h2>
        <button id="refresh-actions" class="text-button" type="button">Refresh</button>
      </div>
      <div class="drawer-controls">
        <label for="trigger-select">Bubble Type</label>
        <select id="trigger-select"></select>
        <label class="toggle-inline" for="auto-actions-toggle">
          <input id="auto-actions-toggle" type="checkbox" checked />
          Auto-actions
        </label>
      </div>
      <div id="brainstorm-summary" class="brainstorm-summary">Loading brainstorm configuration...</div>
      <div id="action-list" class="action-list" aria-live="polite"></div>
    </aside>
    <div id="drawer-backdrop" class="drawer-backdrop"></div>

    <!-- Full-bleed graph canvas -->
    <div id="graph-canvas" class="graph-canvas" aria-live="polite">
      <svg id="graph-edges" class="graph-edges" aria-hidden="true"></svg>
      <div id="graph-nodes" class="graph-nodes"></div>
      <div id="node-popup" class="node-popup hidden"></div>
    </div>

    <!-- Floating status overlays -->
    <div id="graph-summary" class="graph-status">Graph not loaded yet.</div>
    <div id="graph-detail" class="graph-status graph-status-detail"></div>

    <!-- Hidden file input for graph import -->
    <input id="import-graph-file" type="file" accept="application/json" hidden />

    <!-- Toast container for transient messages -->
    <div id="toast-container" class="toast-container"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
